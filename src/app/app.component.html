<!-- app.component.html -->
<div class="container">
    <!-- Login Button -->
    <div *ngIf="!isAuthenticated">
        <button (click)="onLogin()">Login with Google</button>
    </div>

    <!-- User Profile Info -->
    <div *ngIf="isAuthenticated">
        <div class="profile">
            <img *ngIf="user" [src]="user?.picture" alt="Profile Picture"
                onerror="this.onerror=null;this.src='https://via.placeholder.com/96';">
            <p>Welcome, {{ user?.name }}!</p>
            <button (click)="onLogout()">Logout</button>
        </div>

        <!-- app.component.html -->
        <div class="container">
            <div *ngIf="currentFlashcard">
                <h3>Flashcard</h3>
                <p>{{ currentFlashcard[0] }}</p> <!-- Display front side of flashcard -->

                <input type="text" [(ngModel)]="answer" placeholder="Enter your answer" (keydown.enter)="submitAnswer()"
                    [disabled]="isForceCorrectAnswer && isAnsweredCorrectly" />

                <button (click)="submitAnswer()">Submit</button>

                <p *ngIf="feedback">{{ feedback }}</p>
            </div>
        </div>

        <!-- Flashcards Table -->
        <div *ngIf="flashcards.length > 0">
            <h3>Your Flashcards</h3>
            <table>
                <thead>
                    <tr>
                        <th>Front</th>
                        <th>Back</th>
                        <th>Correct/Incorrect</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let card of flashcards">
                        <td>{{ card[0] }}</td>
                        <td>{{ card[1] }}</td>
                        <td>{{ card[2] }}</td>
                        <td>{{ card[3] }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
