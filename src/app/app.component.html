<p>Sheets API Quickstart</p>

<!--Add buttons to initiate auth sequence and sign out-->
<button *ngIf="isInitialized" id="authorize_button" (click)="handleAuthClick()">Authorize</button>
<button *ngIf="isInitialized" id="signout_button" (click)="handleSignoutClick()">Sign Out</button>
<button *ngIf="isSignedIn" id="revoke_button" (click)="getData()">Get Data</button>

<div>{{data | json}}</div>
