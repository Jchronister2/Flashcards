<!-- app.component.html -->
<div class="container bg-light">
    <!-- Login Button -->
    <div *ngIf="!isAuthenticated">
        <button class="btn btn-primary" (click)="onLogin()">Login with Google</button>
    </div>

    <div *ngIf="isAuthenticated">
        <!-- User Profile Info -->
        <div class="profile">
            <img *ngIf="user" [src]="user?.picture" alt="Profile Picture"
                onerror="this.onerror=null;this.src='https://via.placeholder.com/96';">
            <p>Welcome, {{ user?.name }}!</p>
            <button (click)="onLogout()" class="btn btn-outline-danger">Logout</button>
        </div>

        <app-study class=""></app-study>

        <!-- Flashcards Table -->
        <div *ngIf="flashcards.length > 0">
            <h3>Your Flashcards</h3>
            <table>
                <thead>
                    <tr>
                        <th>Front</th>
                        <th>Back</th>
                        <th>Correct</th>
                        <th>Incorrect</th>
                        <th>Last Correct</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let card of flashcards">
                        <td>{{ card[0] }}</td>
                        <td>{{ card[1] }}</td>
                        <td>{{ card[2] }}</td>
                        <td>{{ card[3] }}</td>
                        <td>{{ card[4] | date }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
