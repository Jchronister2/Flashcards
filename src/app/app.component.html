<!-- app.component.html -->
<div class="container-fluid min-vh-100 bg-light p-0">
    <div *ngIf="isAuthenticated" class="app-container">
        <div class="app-header">
            <h1>Flashcards</h1>
            <div class="nav-buttons">
                <button routerLink="/decks" routerLinkActive="active">Decks</button>
                <button routerLink="/study" routerLinkActive="active">Study</button>
            </div>
            <div *ngIf="isDemoMode" class="demo-actions">
                <span class="demo-badge">Demo data</span>
                <button class="reset-demo-button" type="button" title="Reset demo data" (click)="onResetDemoData()">
                    <span class="material-icons" aria-hidden="true">restart_alt</span>
                    <span class="visually-hidden">Reset demo data</span>
                </button>
            </div>
            <app-profile *ngIf="!isDemoMode"></app-profile>
        </div>
    </div>

    <router-outlet></router-outlet>
</div>
