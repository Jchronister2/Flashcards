<!-- app.component.html -->
<div class="container bg-light">
    <!-- Login Button -->
    <div *ngIf="!isAuthenticated">
        <button (click)="onLogin()">Login with Google</button>
    </div>

    <!-- User Profile Info -->
    <div *ngIf="isAuthenticated">
        <div class="profile">
            <img *ngIf="user" [src]="user?.picture" alt="Profile Picture"
                onerror="this.onerror=null;this.src='https://via.placeholder.com/96';">
            <p>Welcome, {{ user?.name }}!</p>
            <button (click)="onLogout()" class="btn btn-outline-danger">Logout</button>
        </div>

        <div class="d-flex justify-content-between align-items-center" style="min-height: 350px;">
            <!-- Front of Flashcard -->
            <div class="card bg-primary text-light border-dark" style="width: 45%; min-height: 350px;">
                <div class="p-3">
                    <h5 class="card-title text-center" style="font-size: 1.75rem;">Front</h5>
                </div>
                <div class="position-absolute top-50 start-50 translate-middle" style="flex-grow: 1;">
                    <p class="card-text text-center" style="font-size: 1.5rem;">{{ currentFlashcard[0] }}</p>
                </div>
            </div>

            <!-- Input and Back of Flashcard -->
            <div class="card bg-secondary text-light border-dark position-relative"
                style="width: 45%; min-height: 350px;">
                <div class="p-3 text-center">
                    <h5 class="card-title" style="font-size: 1.75rem;">Back</h5>
                </div>

                <!-- Input field centered using position-absolute -->
                <div class="position-absolute top-50 start-50 translate-middle" style="width: 80%;">
                    <input type="text" class="form-control" style="font-size: 1.25rem;" [(ngModel)]="answer"
                        placeholder="Enter your answer" (keydown.enter)="submitAnswer()"
                        [disabled]="isForceCorrectAnswer && isAnsweredCorrectly" />
                </div>

                <!-- Submit button and feedback message at the bottom -->
                <div class="d-flex flex-column justify-content-center align-items-center p-3"
                    style="width: 100%; position: absolute; bottom: 0;">
                    <!-- Feedback -->
                    <div class="" style="min-height: 1.5rem;">
                        <p *ngIf="feedback" class="text-light" style="font-size: 1.25rem;">
                            {{ feedback }}
                        </p>
                    </div>
                    <button (click)="submitAnswer()" class="btn btn-success" style="font-size: 1.5rem;">Submit</button>
                </div>
            </div>
        </div>

        <!-- Flashcards Table -->
        <div *ngIf="flashcards.length > 0">
            <h3>Your Flashcards</h3>
            <table>
                <thead>
                    <tr>
                        <th>Front</th>
                        <th>Back</th>
                        <th>Correct</th>
                        <th>Incorrect</th>
                        <th>Last Correct</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let card of flashcards">
                        <td>{{ card[0] }}</td>
                        <td>{{ card[1] }}</td>
                        <td>{{ card[2] }}</td>
                        <td>{{ card[3] }}</td>
                        <td>{{ card[4] | date }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
