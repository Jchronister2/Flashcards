<div class="modal" *ngIf="isVisible">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="edit-card-title">
        <div class="modal-header">
            <h4 id="edit-card-title">Edit Flashcard</h4>
            <button type="button" class="close-btn" title="Close edit card dialog"
                aria-label="Close edit card dialog" (click)="onClose()">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label for="editFront">Front</label>
                <textarea id="editFront" [(ngModel)]="editedFlashcard.front" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="editBack">Back</label>
                <textarea id="editBack" [(ngModel)]="editedFlashcard.back" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="editTags">Tags (comma-separated)</label>
                <input type="text" id="editTags" [(ngModel)]="editedFlashcard.tags" class="form-control">
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
            <button type="button" class="btn btn-primary" (click)="onSave()"
                [disabled]="!editedFlashcard.front.trim() || !editedFlashcard.back.trim()">Save</button>
        </div>
    </div>
</div>
