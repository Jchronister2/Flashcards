<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="app-icon">
                <img src="assets/flashcards.png" alt="Flashcards Logo" class="flashcards-logo">
            </div>
            <h1>Flashcards</h1>
            <p>Master your knowledge with spaced repetition</p>
        </div>

        <div class="login-content">
            <button type="button" class="login-button" (click)="onLogin()">
                <img src="https://www.gstatic.com/marketing-cms/assets/images/d5/dc/cfe9ce8b4425b410b49b7f2dd3f3/g.webp"
                    alt="Google Logo" class="google-logo">
                <span>Sign in with Google</span>
            </button>

            <div class="login-features">
                <div class="feature">
                    <span class="material-icons">schedule</span>
                    <span>Spaced Repetition</span>
                </div>
                <div class="feature">
                    <span class="material-icons">cloud_sync</span>
                    <span>Cloud Sync</span>
                </div>
                <div class="feature">
                    <span class="material-icons">analytics</span>
                    <span>Progress Tracking</span>
                </div>
            </div>
        </div>
    </div>
</div>
