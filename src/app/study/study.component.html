<div class="study-container">
    <!-- Deck Selection -->
    <div class="deck-selector" *ngIf="decks.length > 0">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h2 class="mb-0">Study Session</h2>
            <div class="deck-select-wrapper">
                <select class="form-select" [ngModel]="currentDeck?.id" (ngModelChange)="onDeckChange($event)">
                    <option *ngFor="let deck of decks" [value]="deck.id">{{ deck.name }}</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="!currentFlashcard" class="text-center py-5">
        <div *ngIf="decks.length === 0">
            <p class="h4 mb-3">Loading decks...</p>
        </div>
        <div *ngIf="decks.length > 0 && !currentDeck">
            <p class="h4 mb-3">Please select a deck to start studying</p>
        </div>
    </div>

    <!-- Flashcard Display -->
    <div class="d-flex justify-content-between align-items-center" style="min-height: 350px" *ngIf="currentFlashcard">
        <!-- Front of Flashcard -->
        <div class="position-relative" style="width: 45%; min-height: 350px;">
            <!-- Back layer card -->
            <div class="card flashcard bg-primary text-light border-light position-absolute"
                style="bottom: 10px; right: 10px">
            </div>
            <!-- Middle layer card -->
            <div class="card flashcard bg-primary text-light border-light position-absolute"
                style="bottom: 5px; right: 5px">
            </div>
            <!-- Front card -->
            <div class="card flashcard bg-primary text-light border-light">
                <div class="d-flex justify-content-between align-items-center p-3 position-relative">
                    <h5 class="card-title position-absolute start-50 translate-middle-x" style="font-size: 1.75rem;">
                        Front
                    </h5>
                    <div class="d-flex gap-2">
                        <span class="material-icons" type="button" (click)="openEditModal()">edit</span>
                    </div>
                </div>

                <div class="position-absolute top-50 start-50 translate-middle" style="flex-grow: 1;">
                    <p class="card-text text-center" style="font-size: 1.5rem;">{{ currentFlashcard.front }}</p>
                </div>

                <div class="position-absolute bottom-0 start-50 translate-middle" style="flex-grow: 1;">
                    <div class="d-flex flex-wrap gap-2">
                        <span *ngFor="let tag of tags" class="badge rounded-pill bg-info">#{{ tag }}</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input and Back of Flashcard with stacking effect -->
        <div class="position-relative" style="width: 45%; min-height: 350px;">
            <!-- Back layer card -->
            <div class="card flashcard bg-secondary text-light border-light position-absolute"
                style="top: 10px; left: 10px">
            </div>
            <!-- Middle layer card -->
            <div class="card flashcard bg-secondary text-light border-light position-absolute"
                style="top: 5px; left: 5px">
            </div>
            <!-- Front card -->
            <div class="card flashcard bg-secondary text-light border-light">
                <div class="p-3 text-center">
                    <h5 class="card-title" style="font-size: 1.75rem;">Back</h5>
                </div>

                <!-- Input field centered using position-absolute -->
                <div class="position-absolute top-50 start-50 translate-middle" style="width: 80%;">
                    <input type="text" class="form-control" style="font-size: 1.25rem;" [(ngModel)]="answer"
                        placeholder="Enter your answer" (keydown.enter)="submitAnswer()"
                        [disabled]="isForceCorrectAnswer && isAnsweredCorrectly" />
                </div>

                <!-- Submit button and feedback message at the bottom -->
                <div class="d-flex flex-column justify-content-center align-items-center p-3"
                    style="width: 100%; position: absolute; bottom: 0;">
                    <!-- Feedback -->
                    <div class="" style="min-height: 1.5rem;">
                        <p *ngIf="feedback" class="text-light" style="font-size: 1.25rem;">
                            {{ feedback }}
                        </p>
                    </div>
                    <button (click)="submitAnswer()" class="btn btn-success" style="font-size: 1.5rem;">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Flashcard Modal -->
    <app-edit-flashcard-modal [flashcard]="editCard" [isVisible]="showEditModal" (save)="saveEdit($event)"
        (close)="hideEditModal()">
    </app-edit-flashcard-modal>
</div>
